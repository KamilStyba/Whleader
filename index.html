<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#c41e1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="40K Codex">
<title>WH40K Codex</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Cinzel:wght@600;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0d0d12;
  --s1:     #13131a;
  --s2:     #1a1a24;
  --s3:     #21212e;
  --b1:     rgba(255,255,255,0.06);
  --b2:     rgba(255,255,255,0.10);
  --b3:     rgba(255,255,255,0.16);
  --red:    #c41e1e;
  --red2:   #e03030;
  --gold:   #c9a84c;
  --gold2:  #e8c870;
  --t1:     #f0ece4;
  --t2:     #a09888;
  --t3:     #5a5248;
  --r:      14px;
  --r2:     10px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--t1);font-family:'Outfit',sans-serif;font-size:15px;}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100dvh;}
.screen{display:none;flex:1;overflow:hidden;flex-direction:column;}
.screen.active{display:flex;}

/* ── HEADER ── */
.app-header{
  padding:12px 16px 0;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  background:var(--s1);
  border-bottom:1px solid var(--b1);
  flex-shrink:0;
}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.app-title{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:900;color:var(--gold);letter-spacing:0.04em;}
.app-title span{color:var(--red2);}
.header-actions{display:flex;align-items:center;gap:8px;}
.icon-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--s3);border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t2);font-size:1rem;
  transition:all 0.15s;
}
.icon-btn:active{background:var(--s2);color:var(--t1);}
.status-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--s3);border:1px solid var(--b1);
  border-radius:20px;padding:4px 10px;
  font-size:0.7rem;color:var(--t3);font-weight:500;letter-spacing:0.04em;
}
.dot{width:6px;height:6px;border-radius:50%;background:#3d8b3d;box-shadow:0 0 5px #3d8b3d;transition:all 0.3s;}
.dot.off{background:#444;box-shadow:none;}
.dot.sync{background:var(--gold);box-shadow:0 0 6px var(--gold);animation:blink 0.8s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* ── SEARCH BAR ── */
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1px solid var(--b1);
  border-radius:12px;padding:0 12px;
  margin-bottom:12px;
}
.search-bar svg{flex-shrink:0;color:var(--t3);}
.search-bar input{
  flex:1;background:none;border:none;outline:none;
  color:var(--t1);font-family:'Outfit',sans-serif;font-size:0.95rem;
  padding:10px 0;
}
.search-bar input::placeholder{color:var(--t3);}

/* ── FACTION PILLS ── */
.faction-scroll{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;
  scrollbar-width:none;
}
.faction-scroll::-webkit-scrollbar{display:none;}
.faction-pill{
  flex-shrink:0;padding:5px 12px;border-radius:20px;
  border:1px solid var(--b2);background:var(--s2);
  font-size:0.75rem;font-weight:500;color:var(--t2);
  cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.faction-pill.active{color:#fff;border-color:transparent;}
.faction-pill.all.active{background:var(--red);border-color:var(--red);}

/* ── SCROLLABLE CONTENT ── */
.scroll-body{
  flex:1;overflow-y:auto;padding:12px 14px;
  overscroll-behavior:contain;
}
.scroll-body::-webkit-scrollbar{width:3px;}
.scroll-body::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

/* ── UNIT CARD ── */
.unit-card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);margin-bottom:8px;
  cursor:pointer;overflow:hidden;transition:border-color 0.15s;
}
.unit-card:active{border-color:var(--b3);}
.unit-header{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
}
.faction-dot{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;min-height:36px;}
.unit-main{flex:1;min-width:0;}
.unit-name{font-size:0.95rem;font-weight:600;color:var(--t1);margin-bottom:3px;}
.unit-meta{display:flex;gap:5px;flex-wrap:wrap;}
.tag{
  font-size:0.62rem;font-weight:500;letter-spacing:0.03em;
  padding:2px 7px;border-radius:6px;
  background:var(--s3);color:var(--t3);border:1px solid var(--b1);
}
.tag.role{background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.2);color:var(--gold);}
.unit-pts{
  font-family:'Cinzel',serif;font-size:0.85rem;font-weight:600;
  color:var(--t1);flex-shrink:0;text-align:right;
}
.unit-pts small{display:block;font-family:'Outfit',sans-serif;font-size:0.62rem;color:var(--t3);font-weight:400;}

/* ── RESULT COUNT ── */
.result-label{font-size:0.72rem;color:var(--t3);font-weight:500;margin-bottom:10px;letter-spacing:0.03em;}

/* ── BOTTOM SHEET ── */
#sheet-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  backdrop-filter:blur(4px);z-index:100;
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
#sheet-backdrop.open{opacity:1;pointer-events:all;}
#unit-sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--s1);border-radius:20px 20px 0 0;
  border-top:1px solid var(--b2);z-index:101;
  transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height:90dvh;display:flex;flex-direction:column;
  padding-bottom:calc(var(--safe-b) + 16px);
}
#unit-sheet.open{transform:translateY(0);}
.sheet-drag{width:36px;height:4px;background:var(--b3);border-radius:2px;margin:10px auto 0;}
.sheet-header{
  padding:14px 18px 10px;border-bottom:1px solid var(--b1);flex-shrink:0;
}
.sheet-name{font-size:1.1rem;font-weight:700;color:var(--t1);margin-bottom:4px;}
.sheet-faction{font-size:0.75rem;color:var(--t3);font-weight:500;}
.sheet-body{overflow-y:auto;padding:16px 18px;flex:1;}
.sheet-body::-webkit-scrollbar{display:none;}

/* ── SHEET SECTIONS ── */
.sh-section{margin-bottom:20px;}
.sh-title{
  font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--t3);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--b1);
}
/* stats grid */
.stats-row{
  display:grid;grid-template-columns:repeat(7,1fr);gap:4px;
}
.stat-cell{
  background:var(--s2);border:1px solid var(--b1);border-radius:8px;
  text-align:center;padding:6px 2px;
}
.stat-label{font-size:0.55rem;color:var(--t3);font-weight:600;letter-spacing:0.06em;display:block;}
.stat-val{font-size:0.9rem;font-weight:700;color:var(--t1);}
.stat-model-name{font-size:0.72rem;color:var(--t2);margin-bottom:5px;font-weight:500;}

/* weapon card */
.weapon-card{
  background:var(--s2);border:1px solid var(--b1);border-radius:10px;
  margin-bottom:6px;overflow:hidden;
}
.weapon-top{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;border-bottom:1px solid var(--b1);
}
.weapon-name{font-size:0.85rem;font-weight:600;color:var(--t1);}
.weapon-range{font-size:0.75rem;color:var(--t3);}
.weapon-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:0;}
.w-stat{text-align:center;padding:6px 2px;}
.w-label{font-size:0.52rem;color:var(--t3);font-weight:600;letter-spacing:0.05em;display:block;}
.w-val{font-size:0.85rem;font-weight:700;color:var(--t1);}
.weapon-kws{padding:5px 12px;font-size:0.72rem;color:var(--gold);font-style:italic;}

/* ability */
.ability-item{margin-bottom:10px;}
.ability-name{
  font-size:0.8rem;font-weight:700;color:var(--red2);margin-bottom:3px;
}
.ability-desc{font-size:0.82rem;color:var(--t2);line-height:1.5;}
.pts-badge{
  display:inline-block;background:rgba(196,30,30,0.15);border:1px solid rgba(196,30,30,0.3);
  color:var(--red2);border-radius:8px;padding:4px 12px;
  font-family:'Cinzel',serif;font-size:0.9rem;font-weight:700;
  margin-bottom:12px;
}

/* ── DETACHMENTS TAB ── */
.det-faction-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:8px;margin-top:4px;
}
.det-faction-line{flex:1;height:1px;background:var(--b1);}
.det-faction-label{
  font-size:0.65rem;font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--t3);flex-shrink:0;
}
.det-card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);margin-bottom:8px;overflow:hidden;cursor:pointer;
  transition:border-color 0.15s;
}
.det-card:active{border-color:var(--b3);}
.det-header{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.det-color-bar{width:3px;border-radius:2px;align-self:stretch;min-height:32px;flex-shrink:0;}
.det-info{flex:1;}
.det-name{font-size:0.9rem;font-weight:600;color:var(--t1);}
.det-rule-name{font-size:0.72rem;color:var(--t3);margin-top:2px;}
.det-chevron{color:var(--t3);font-size:0.7rem;transition:transform 0.2s;}
.det-card.open .det-chevron{transform:rotate(180deg);}
.det-body{display:none;padding:0 14px 14px;border-top:1px solid var(--b1);}
.det-card.open .det-body{display:block;}
.det-rule-desc{font-size:0.8rem;color:var(--t2);line-height:1.5;padding:10px 0;margin-bottom:8px;border-bottom:1px solid var(--b1);}
.strat-item{
  background:var(--s2);border:1px solid var(--b1);border-radius:10px;
  padding:9px 11px;margin-bottom:6px;
}
.strat-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;}
.strat-name{font-size:0.8rem;font-weight:600;color:var(--t1);}
.strat-cost{
  flex-shrink:0;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.25);
  color:var(--gold);border-radius:6px;padding:2px 7px;font-size:0.68rem;font-weight:700;
}
.strat-desc{font-size:0.77rem;color:var(--t2);line-height:1.45;}
.enh-item{
  background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);
  border-radius:10px;padding:8px 11px;margin-bottom:6px;
}
.enh-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px;}
.enh-name{font-size:0.8rem;font-weight:600;color:var(--gold);}
.enh-pts{font-size:0.68rem;color:var(--t3);}
.enh-desc{font-size:0.77rem;color:var(--t2);line-height:1.45;}
.sub-title{
  font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--t3);margin:10px 0 6px;
}

/* ── BOTTOM NAV ── */
#bottom-nav{
  display:flex;background:var(--s1);border-top:1px solid var(--b1);
  padding-bottom:calc(var(--safe-b) + 4px);flex-shrink:0;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;cursor:pointer;border:none;background:none;
  color:var(--t3);font-family:'Outfit',sans-serif;font-size:0.62rem;font-weight:500;
  letter-spacing:0.03em;transition:color 0.15s;
}
.nav-btn.active{color:var(--red2);}
.nav-icon{font-size:1.2rem;line-height:1;}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:48px 20px;color:var(--t3);}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}
.empty-title{font-size:1rem;font-weight:600;color:var(--t2);margin-bottom:6px;}
.empty-desc{font-size:0.8rem;line-height:1.5;}

/* ── INSTALL BANNER ── */
#install-banner{
  display:none;flex-shrink:0;
  align-items:center;justify-content:space-between;
  background:linear-gradient(90deg,rgba(196,30,30,0.15),rgba(201,168,76,0.1));
  border-top:1px solid rgba(196,30,30,0.3);padding:9px 14px;gap:10px;
}
#install-banner.show{display:flex;}
.inst-text{font-size:0.78rem;color:var(--t2);}
.inst-btn{
  background:var(--red);color:#fff;border:none;border-radius:8px;
  font-family:'Outfit',sans-serif;font-size:0.75rem;font-weight:600;
  padding:6px 14px;cursor:pointer;flex-shrink:0;
}
.inst-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:1rem;padding:2px;}

/* ── FAVOURITES ── */
.fav-btn{
  width:32px;height:32px;background:none;border:none;
  cursor:pointer;color:var(--t3);font-size:1.1rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:color 0.15s;
}
.fav-btn.active{color:#e8b84b;}

/* ── LEGEND BADGE ── */
.legend-badge{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.35);
  color:var(--gold);border-radius:5px;padding:1px 6px;
  font-size:0.58rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  flex-shrink:0;
}
.legend-badge-card{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);
  color:var(--gold);border-radius:4px;padding:1px 5px;
  font-size:0.55rem;font-weight:700;letter-spacing:0.07em;margin-left:4px;
  vertical-align:middle;
}

/* ── CORE ABILITY CHIPS ── */
.core-abilities{
  display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;
}
.core-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--s2);border:1px solid var(--b2);
  border-radius:6px;padding:4px 9px;
  font-size:0.73rem;font-weight:500;color:var(--t1);
}
.core-chip-icon{font-size:0.8rem;}
.core-chip-val{color:var(--gold);font-weight:700;margin-left:2px;}

/* ── SYNC NOTICE ── */
.sync-notice{
  font-size:0.7rem;color:var(--t3);text-align:center;
  padding:6px;border-bottom:1px solid var(--b1);flex-shrink:0;
}

.stat-sub{
  font-size:0.6rem;
  color:var(--gold);
  margin-top:2px;
}

/* ── WAHAPEDIA SHEET ENHANCEMENTS ── */

/* Weapon table using proper table */
.wh-weapon-section{margin-bottom:14px;}
.wh-weapon-section-header{
  display:flex;align-items:center;gap:6px;padding:5px 0 4px;
  border-bottom:2px solid var(--red);margin-bottom:4px;
}
.wh-weapon-type-label{
  font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--red2);
}
.wh-weapon-type-icon{font-size:0.75rem;}
.wh-wtable{width:100%;border-collapse:collapse;font-size:0.74rem;}
.wh-wtable th{
  font-size:0.52rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--t3);padding:4px 3px;text-align:center;background:var(--s3);
}
.wh-wtable th:first-child{text-align:left;padding-left:8px;min-width:90px;}
.wh-wtable td{padding:5px 3px;text-align:center;color:var(--t1);border-bottom:1px solid var(--b1);}
.wh-wtable td:first-child{text-align:left;padding-left:8px;font-weight:500;color:var(--t1);font-size:0.76rem;}
.wh-wtable tr:last-child td{border-bottom:none;}
.wh-wkw{padding:2px 8px 6px;display:flex;flex-wrap:wrap;gap:3px;}
.wh-wkw-tag{
  display:inline-block;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);
  color:var(--gold);border-radius:4px;padding:1px 6px;font-size:0.58rem;
  font-weight:500;letter-spacing:0.02em;
}

/* Wargear Options */
.wh-wargear-list{padding:0;margin:0;list-style:none;}
.wh-wargear-list li{
  font-size:0.78rem;color:var(--t2);line-height:1.5;
  padding:5px 0 5px 14px;position:relative;border-bottom:1px solid var(--b1);
}
.wh-wargear-list li:last-child{border-bottom:none;}
.wh-wargear-list li::before{
  content:'▸';position:absolute;left:0;color:var(--red2);font-size:0.6rem;top:7px;
}

/* Core stratagem cards */
.core-strat-list{display:flex;flex-direction:column;gap:6px;}
.core-strat-card{
  background:var(--s2);border:1px solid var(--b1);border-radius:10px;
  overflow:hidden;cursor:pointer;transition:border-color 0.15s;
}
.core-strat-card.relevant{border-left:3px solid var(--gold);}
.core-strat-card:active{border-color:var(--b3);}
.core-strat-header{
  display:flex;align-items:center;gap:8px;padding:8px 11px;
}
.core-strat-name{font-size:0.82rem;font-weight:600;color:var(--t1);flex:1;}
.core-strat-badges{display:flex;gap:4px;flex-shrink:0;align-items:center;}
.core-strat-cp{
  background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);
  color:var(--gold);border-radius:5px;padding:1px 6px;
  font-size:0.65rem;font-weight:700;
}
.core-strat-phase{
  background:rgba(196,30,30,0.12);border:1px solid rgba(196,30,30,0.25);
  color:var(--red2);border-radius:5px;padding:1px 6px;
  font-size:0.62rem;font-weight:600;
}
.core-strat-relevant-tag{
  background:rgba(201,168,76,0.2);color:var(--gold2);
  border-radius:4px;padding:1px 5px;font-size:0.58rem;font-weight:700;letter-spacing:0.04em;
}
.core-strat-body{
  display:none;padding:0 11px 10px;border-top:1px solid var(--b1);
}
.core-strat-card.open .core-strat-body{display:block;}
.core-strat-desc{font-size:0.78rem;color:var(--t2);line-height:1.5;padding-top:8px;}
.core-strat-type{
  font-size:0.62rem;color:var(--t3);font-weight:600;letter-spacing:0.05em;
  text-transform:uppercase;margin-bottom:4px;padding-top:6px;
}
.strat-relevant-note{
  font-size:0.7rem;color:var(--gold);margin-top:5px;font-weight:500;
}

/* Legend filter button */
.legend-filter-btn{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:8px;padding:5px 10px;
  border:1px solid var(--b2);background:var(--s3);
  cursor:pointer;font-family:'Outfit',sans-serif;
  font-size:0.7rem;font-weight:600;color:var(--t3);
  letter-spacing:0.04em;transition:all 0.15s;
  flex-shrink:0;
}
.legend-filter-btn.active{
  background:rgba(201,168,76,0.15);
  border-color:rgba(201,168,76,0.4);
  color:var(--gold);
}
.filter-row{
  display:flex;align-items:center;gap:8px;
  padding-bottom:10px;
}

/* Unit composition */
.wh-comp-wrap{background:var(--s2);border:1px solid var(--b1);border-radius:10px;overflow:hidden;}
.wh-comp-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:0.8rem;color:var(--t2);padding:7px 12px;border-bottom:1px solid var(--b1);
}
.wh-comp-row:last-child{border-bottom:none;}
.wh-comp-models{flex:1;}
.wh-comp-pts{
  font-family:'Cinzel',serif;font-size:0.8rem;font-weight:700;color:var(--t1);
  background:rgba(196,30,30,0.15);border:1px solid rgba(196,30,30,0.25);
  border-radius:5px;padding:1px 8px;flex-shrink:0;
}

}

.damaged-box{
  background:rgba(196,30,30,0.07);border:1px solid rgba(196,30,30,0.25);

}
.damaged-row{
  display:flex;align-items:flex-start;gap:10px;

}

.wh-kw-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.wh-kw-pill{
  font-size:0.63rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;
  padding:3px 9px;border-radius:5px;
  background:var(--s3);color:var(--t2);border:1px solid var(--b2);
}

  background:rgba(196,30,30,0.12);color:var(--red2);border-color:rgba(196,30,30,0.28);font-weight:700;

.wh-det-group-rule{font-size:0.66rem;color:var(--t3);letter-spacing:0.02em;}

</div>

// DATABASE
// ═══════════════════════════════════════════════════════════════
let db;
function openDB(){
  return new Promise((ok,fail)=>{
    const r=indexedDB.open('wh40k_v2',2);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      ['units','factions','detachments','meta','coreStratagems'].forEach(s=>{
        if(!d.objectStoreNames.contains(s)) d.createObjectStore(s,{keyPath:s==='meta'?'key':'id'});
      });
    };
    r.onsuccess=e=>{db=e.target.result;ok();};
    r.onerror=fail;
  });
}
const tx=(s,m)=>db.transaction(s,m).objectStore(s);
function dbPutAll(store, arr) {
  return Promise.all(arr.map(x => new Promise((ok) => {
    const keyField = store === 'meta' ? 'key' : 'id';

    if (!x || x[keyField] == null || x[keyField] === '') {
      console.warn(`Skipped invalid ${store}:`, x);
      return ok();
    }

    const r = tx(store, 'readwrite').put(x);
    r.onsuccess = () => ok();
    r.onerror = () => {
      console.warn(`Failed to store ${store}:`, x);
      ok();
    };
  })));
}function dbGetAll(store){return new Promise((ok,f)=>{const r=tx(store,'readonly').getAll();r.onsuccess=()=>ok(r.result);r.onerror=f;});}
function dbGet(store,key){return new Promise((ok,f)=>{const r=tx(store,'readonly').get(key);r.onsuccess=()=>ok(r.result);r.onerror=f;});}
function dbPut(store,obj){return new Promise((ok,f)=>{const r=tx(store,'readwrite').put(obj);r.onsuccess=ok;r.onerror=f;});}

let units=[], factions=[], detachments=[], coreStratagems=[], favourites=new Set();
let activeScreen='units', activeFaction='all', unitSearch='', detFaction='all', detSearch='';
let expandedDets=new Set();

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init(){
  await openDB();
  const dbUnits=await dbGetAll('units');
  const dbFavs=await dbGet('meta','favourites');
  if(dbUnits.length>0){
    units=dbUnits;
    factions=await dbGetAll('factions')||FACTIONS;
    detachments=await dbGetAll('detachments')||DETACHMENTS;
    coreStratagems=await dbGetAll('coreStratagems')||[];
  }
  else { units=UNITS; factions=FACTIONS; detachments=DETACHMENTS; coreStratagems=[]; await seed(); }
  if(dbFavs) favourites=new Set(dbFavs.value);
  const meta=await dbGet('meta','lastSync');
  updateSyncNotice(meta?.value);
  updateStatus();
  renderFactionPills();
  renderDetFactionPills();
  renderUnits();
  renderDets();
  renderFavs();
  window.addEventListener('online',updateStatus);
  window.addEventListener('offline',updateStatus);
  if(navigator.onLine){
    const lt=await dbGet('meta','lastSyncTime');
    const lastSyncVal=(await dbGet('meta','lastSync'))?.value||'';
    const neverFetchedWaha=!lastSyncVal.includes('Wahapedia');
    if(neverFetchedWaha||!lt||(Date.now()-lt.value)>6*3600000) doSync();
  }
  setupSheetGestures();
}

async function seed(){
  await dbPutAll('units',UNITS);
  await dbPutAll('factions',FACTIONS);
  await dbPutAll('detachments',DETACHMENTS);
  await dbPut('meta',{key:'lastSync',value:'Built-in data'});
}

function updateSyncNotice(val){
  const el=document.getElementById('sync-notice');
  el.textContent=val?`Last synced: ${val}`:'';
  el.style.display=val?'block':'none';
}

function updateStatus(){
  const on=navigator.onLine;
  ['dot','dot2'].forEach(id=>{
    const d=document.getElementById(id);
    if(d){d.className='dot'+(on?'':' off');}
  });
  ['status-lbl','status-lbl2'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.textContent=on?'ONLINE':'OFFLINE';
  });
}

async function triggerSync(){
  if(!navigator.onLine){ updateSyncNotice('No connection — cannot sync.'); return; }
  const btn = document.querySelector('.icon-btn[onclick="triggerSync()"]');
  if(btn){ btn.style.opacity='0.4'; btn.style.pointerEvents='none'; }
  await doSync();
  if(btn){ btn.style.opacity=''; btn.style.pointerEvents=''; }
}

// ─── WAHAPEDIA CSV FETCHER ───────────────────────────────────────────
// Wahapedia provides public CSV exports. We use corsproxy.io to bypass CORS.
// ─── REAL WAHAPEDIA CSV FETCHER ─────────────────────────────────────
// All filenames verified from the official Wahapedia Export Data Specs xlsx
const PROXY = 'https://corsproxy.io/?url=';
const BASE  = 'https://wahapedia.ru/wh40k10ed/';

function fetchCSV(url) {
  return fetch(PROXY + encodeURIComponent(url), {signal: AbortSignal.timeout(15000)})
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); });
}

function parseCSV(text) {
  if (!text || !text.trim()) return [];
  const lines = text.replace(/\r/g, '').split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split('|').map(h => h.replace(/^\uFEFF/, '').trim());
  return lines.slice(1).map(line => {
    const vals = line.split('|');
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
    return obj;
  }).filter(o => Object.values(o).some(v => v));
}

function stripHTML(html) {
  return (html || '')
    .replace(/<[^>]+>/g, '')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"').replace(/&#39;/g,"'")
    .replace(/\s+/g,' ').trim();
}

async function doSync() {
  ['dot','dot2'].forEach(id=>{const d=document.getElementById(id);if(d)d.className='dot sync';});
  updateSyncNotice('Syncing from Wahapedia…');

  try {
    // Fetch all verified CSVs in parallel — failures return null and are handled gracefully
    const urls = {
      factions:    BASE + 'Factions.csv',
      sources:     BASE + 'Source.csv',               // source docs — used to detect Legends units
      sheets:      BASE + 'Datasheets.csv',
      models:      BASE + 'Datasheets_models.csv',         // stats: M/T/Sv/W/Ld/OC
      wargear:     BASE + 'Datasheets_wargear.csv',        // weapons: range/A/BS_WS/S/AP/D
      abilities:   BASE + 'Datasheets_abilities.csv',      // unit abilities
      keywords:    BASE + 'Datasheets_keywords.csv',       // keywords
      costs:       BASE + 'Datasheets_models_cost.csv',    // points
      options:     BASE + 'Datasheets_options.csv',        // wargear options text
      sources:     BASE + 'Source.csv',                    // source types — used to detect Legends
      abilityDefs: BASE + 'Abilities.csv',                 // global ability definitions (Deadly Demise, FNP etc.)
      stratagems:  BASE + 'Stratagems.csv',                // all stratagems
      detachments: BASE + 'Detachments.csv',               // detachment list
      detAbils:    BASE + 'Detachment_abilities.csv',      // detachment rules
      leaders:     BASE + 'Datasheets_leader.csv',         // leader ↔ bodyguard links
    };

    const keys = Object.keys(urls);
    const results = await Promise.all(
      Object.values(urls).map(u => fetchCSV(u).catch(() => null))
    );
    const csv = {};
    keys.forEach((k, i) => { csv[k] = results[i]; });

    if (!csv.sheets || !csv.models) throw new Error('Core Wahapedia files unavailable');

    const rawFactions   = parseCSV(csv.factions);
    const rawSources    = parseCSV(csv.sources);
    const rawSheets     = parseCSV(csv.sheets);

    // Build set of source IDs that are Legends documents
    // Pattern 1: name starts with "Legends:" e.g. "Legends: Tyranids"
    // Pattern 2: name contains "(Warhammer Legends)" e.g. "Chaos Space Marines (Warhammer Legends)"
    const legendsSourceIds = new Set(
      rawSources
        .filter(s => s.name && (
          s.name.startsWith('Legends:') ||
          s.name.includes('Warhammer Legends')
        ))
        .map(s => s.id)
    );
    const rawModels     = parseCSV(csv.models);
    const rawWargear    = parseCSV(csv.wargear);
    const rawAbilities  = parseCSV(csv.abilities);
    const rawKeywords   = parseCSV(csv.keywords);
    const rawCosts      = parseCSV(csv.costs);
    const rawOptions    = parseCSV(csv.options);
    const rawSources    = parseCSV(csv.sources);
    const rawStratagems = parseCSV(csv.stratagems);

    // Build a Set of source IDs that are Legends sources
    // Source.csv: id | name | type — Legends sources have "Legends" in name or type
    const legendSourceIds = new Set(
      rawSources
        .filter(s => (s.name||'').toLowerCase().includes('legends') || (s.type||'').toLowerCase().includes('legends'))
        .map(s => s.id)
    );
    console.log(`Legends sources: ${legendSourceIds.size}`, [...legendSourceIds]);
    const rawDetachments= parseCSV(csv.detachments);
    const rawDetAbils   = parseCSV(csv.detAbils);
    const rawLeaders    = parseCSV(csv.leaders);

    // Build sheet name lookup
    const sheetNameById = {};
    rawSheets.forEach(s => { if(s.id && s.name) sheetNameById[s.id] = s.name; });

    // leader_id → names of units it can lead (attached_datasheet_id = bodyguard unit)
    const canLeadMap = {};    // leader datasheet_id → [bodyguard names]
    const attachedByMap = {}; // bodyguard datasheet_id → [leader names]
    rawLeaders.forEach(row => {
      const lid = row.datasheet_id;
      const bid = row.attached_datasheet_id;
      if(!lid || !bid) return;
      if(!canLeadMap[lid]) canLeadMap[lid] = [];
      if(!attachedByMap[bid]) attachedByMap[bid] = [];
      const bName = sheetNameById[bid];
      const lName = sheetNameById[lid];
      if(bName && !canLeadMap[lid].includes(bName)) canLeadMap[lid].push(bName);
      if(lName && !attachedByMap[bid].includes(lName)) attachedByMap[bid].push(lName);
    });

    // Build global ability definitions lookup (id → {name, description})
    const rawAbilityDefs = parseCSV(csv.abilityDefs);
    const abilityDefMap = {};
    rawAbilityDefs.forEach(a => { if(a.id) abilityDefMap[a.id] = a; });

    // Lookup maps keyed by datasheet_id
    const modelsBySheet   = groupBy(rawModels,   'datasheet_id');
    const wargearBySheet  = groupBy(rawWargear,  'datasheet_id');
    const abilitBySheet   = groupBy(rawAbilities,'datasheet_id');
    const kwBySheet       = groupBy(rawKeywords, 'datasheet_id');
    const optsBySheet     = groupBy(rawOptions,  'datasheet_id');

    // Points: Datasheets_models_cost has datasheet_id, line, description, cost
    const costBySheet = {};
    rawCosts.forEach(c => {
      const id = c.datasheet_id;
      const v = +c.cost;
      if (!isNaN(v) && v > 0) {
        if (!costBySheet[id] || v < costBySheet[id]) costBySheet[id] = v;
      }
    });

    // ── Convert factions ──
    const convertedFactions = rawFactions
      .filter(f => f.id && f.name)
      .map(f => ({ id: f.id, name: f.name, color: factionColor(f.id, f.name) }));

    // ── Convert units ──
    const convertedUnits = rawSheets
      .filter(s => s.id && s.name && s.virtual !== 'true')
      .map(s => {
        const models = (modelsBySheet[s.id] || []).map(m => ({
          m:  m.name || s.name,
          M:  m.M  || '—',
          T:  m.T  || '—',
          Sv: m.Sv || '—',
          W:  m.W  || '—',
          Ld: m.Ld || '—',
          OC: m.OC || '—',
          inv: m.inv_sv && m.inv_sv !== '-' ? m.inv_sv + '+' : null,
          inv_descr: m.inv_sv_descr ? stripHTML(m.inv_sv_descr) : null,
        }));

        // Datasheets_wargear fields: datasheet_id, line, in_wargear, dice, name,
        //   description, range, type, A, BS_WS, S, AP, D
        const weapons = (wargearBySheet[s.id] || [])
          .filter(w => w.name && w.range)   // skip blank wargear description rows
          .map(w => ({
            name:  w.name,
            range: w.range || '—',
            A:     w.A    || '—',
            BS:    w.BS_WS|| '—',
            S:     w.S    || '—',
            AP:    w.AP   || '—',
            D:     w.D    || '—',
            kw:    stripHTML(w.description) || '—',
          }));

        // Separate core/faction abilities (with ability_id) from datasheet abilities
        const allAbilRows = abilitBySheet[s.id] || [];

        // Core abilities: rows with ability_id → look up real name + append parameter
        const coreAbilities = allAbilRows
          .filter(a => a.ability_id && abilityDefMap[a.ability_id])
          .map(a => {
            const def = abilityDefMap[a.ability_id];
            const param = (a.parameter || '').trim();
            return {
              name: stripHTML(def.name) + (param ? ' ' + param : ''),
              desc: stripHTML(def.description),
              type: a.type || 'Core',
            };
          })
          // Deduplicate by name
          .filter((a, i, arr) => arr.findIndex(x => x.name === a.name) === i);

        // Datasheet abilities: rows without ability_id that have name+description
        const abilities = allAbilRows
          .filter(a => !a.ability_id && a.name && a.description && a.type !== 'Core' && a.type !== 'Faction')
          .map(a => ({
            name: stripHTML(a.name),
            desc: stripHTML(a.description),
          }));

        // Wargear abilities: type === 'Wargear' or 'Wargear profile'
        const wargearAbilities = allAbilRows
          .filter(a => !a.ability_id && a.name && a.description && (a.type === 'Wargear' || a.type === 'Wargear profile'))
          .map(a => ({
            name: stripHTML(a.name),
            desc: stripHTML(a.description),
          }));

        const keywords = (kwBySheet[s.id] || [])
          .map(k => k.keyword).filter(Boolean);

        // Wargear options: Datasheets_options has datasheet_id, line, button, description
        const wargearOptions = (optsBySheet[s.id] || [])
          .filter(o => o.description && o.description.trim())
          .map(o => stripHTML(o.description));

        return {
          id:       s.id,
          faction:  s.faction_id,
          name:     s.name,
          role:     s.role || 'Unknown',
          pts:      costBySheet[s.id] || 0,
          legend:   legendsSourceIds.has(s.source_id),
          transport:   s.transport ? stripHTML(s.transport) : null,
          damagedW:    s.damaged_w   ? s.damaged_w.trim()   : null,
          damagedDesc: s.damaged_description ? stripHTML(s.damaged_description) : null,
          canLead:     canLeadMap[s.id]    || [],
          attachedBy:  attachedByMap[s.id] || [],
          stats:    models,
          weapons,
          coreAbilities,
          abilities,
          wargearAbilities,
          wargearOptions,
          keywords,
        };
      })
      .filter(u => u.stats.length > 0);

    // ── Convert detachments + stratagems ──
    // Core stratagems: faction_id empty, type contains "Core", AND no detachment_id
    const TYPE_KWS = ['INFANTRY','MOUNTED','VEHICLE','MONSTER','CHARACTER',
      'WALKER','TITANIC','BEAST','CAVALRY','BATTLELINE','TRANSPORT','PSYKER'];

    // Parse raw HTML description to extract TARGET requirements before stripping
    function parseStratTarget(rawDesc) {
      if (!rawDesc) return { targetKws: [], excludeKws: [] };
      const upper = rawDesc.toUpperCase();

      // Find <b>TARGET:</b> section (raw HTML format from Wahapedia)
      const tStart = upper.search(/<B>TARGET:<\/B>/);
      if (tStart === -1) return { targetKws: [], excludeKws: [] }; // universal

      // Get text until next <b>EFFECT:</b> or <b>RESTRICTIONS:</b>
      const after = rawDesc.slice(tStart);
      const nextSec = after.toUpperCase().search(/<B>(EFFECT:|RESTRICTIONS:|RESULT:)<\/B>/);
      const targetRaw = nextSec === -1 ? after : after.slice(0, nextSec);

      // Extract kwb span keywords: <span class="kwb">KEYWORD</span>
      const kwbKws = [...targetRaw.matchAll(/<span class="kwb">([^<]+)<\/span>/gi)]
        .map(m => m[1].trim().toUpperCase());

      // Strip HTML to plain text for further parsing
      const targetPlain = targetRaw.replace(/<[^>]+>/g, ' ').toUpperCase();

      // Also check for plain type keywords directly in text
      TYPE_KWS.forEach(kw => {
        if (targetPlain.includes(kw) && !kwbKws.includes(kw)) kwbKws.push(kw);
      });

      // Check for [BRACKET] weapon/ability keywords e.g. [GRENADES], [SMOKE]
      const bracketKws = [...targetPlain.matchAll(/\[([A-Z][A-Z0-9\s\-]+?)\]/g)]
        .map(m => m[1].trim());
      bracketKws.forEach(kw => { if (!kwbKws.includes(kw)) kwbKws.push(kw); });

      // Separate excluded keywords from required — look for "excluding X" pattern
      const excludeKws = [];
      const excludeMatch = targetPlain.match(/EXCLUDING[^.]+?(\b(?:MONSTER|VEHICLE|INFANTRY|MOUNTED|CHARACTER|WALKER|TITANIC|BEAST|CAVALRY|BATTLELINE|TRANSPORT)(?:\s+(?:AND|OR)\s+\b(?:MONSTER|VEHICLE|INFANTRY|MOUNTED|CHARACTER|WALKER|TITANIC|BEAST|CAVALRY|BATTLELINE|TRANSPORT))*)/g);
      if (excludeMatch) {
        excludeMatch.forEach(ex => {
          TYPE_KWS.forEach(kw => { if (ex.includes(kw)) excludeKws.push(kw); });
        });
      }

      // Required = all found minus excluded
      const targetKws = kwbKws.filter(kw => !excludeKws.includes(kw));

      return { targetKws, excludeKws };
    }

    const convertedCoreStrats = rawStratagems
      .filter(s => s.name && s.description
        && (!s.faction_id    || s.faction_id.trim()    === '')
        && (!s.detachment_id || s.detachment_id.trim() === '')
        && (s.type||'').includes('Core'))
      .map(s => {
        const { targetKws, excludeKws } = parseStratTarget(s.description);
        return {
          id:         s.id,
          name:       s.name,
          type:       s.type || '',
          cost:       s.cp_cost ? s.cp_cost + 'CP' : '1CP',
          turn:       s.turn  || '',
          phase:      s.phase || '',
          desc:       stripHTML(s.description),
          targetKws,
          excludeKws,
        };
      });

    // Stratagems keyed by detachment_id
    const stratByDet = groupBy(rawStratagems, 'detachment_id');
    // Detachment abilities keyed by detachment_id
    const detAbilByDet = groupBy(rawDetAbils, 'detachment_id');

    const convertedDetachments = rawDetachments
      .filter(d => d.id && d.name && d.faction_id)
    .map(d => {
    const rule = (detAbilByDet[d.id] || [])[0];
    const strats = (stratByDet[d.id] || [])
      .filter(s => s.name && s.description)
      .map(s => ({
        name: s.name,
        cost: s.cp_cost ? s.cp_cost + 'CP' : '?CP',
        desc: stripHTML(s.description),
      }));

    return {
      id: d.id, // ✅ THIS WAS MISSING
      faction: d.faction_id,
      name: d.name,
      rule: rule ? rule.name : d.name,
      ruleDesc: rule ? stripHTML(rule.description) : '',
      stratagems: strats,
      enhancements: [],
    };
  });

    // ── Save everything to DB ──
    await dbPutAll('units', convertedUnits);
    if (convertedFactions.length > 0) await dbPutAll('factions', convertedFactions);
    if (convertedDetachments.length > 0) await dbPutAll('detachments', convertedDetachments);
    if (convertedCoreStrats.length > 0) await dbPutAll('coreStratagems', convertedCoreStrats);

    units          = convertedUnits;
    factions       = convertedFactions.length > 0 ? convertedFactions : FACTIONS;
    detachments    = convertedDetachments.length > 0 ? convertedDetachments : DETACHMENTS;
    coreStratagems = convertedCoreStrats;

    const now = new Date().toLocaleString('en-GB', {dateStyle:'short', timeStyle:'short'});
    await dbPut('meta', {key:'lastSync',     value:`Wahapedia · ${now}`});
    await dbPut('meta', {key:'lastSyncTime', value:Date.now()});
    updateSyncNotice(`✓ Wahapedia · ${now} · ${units.length} units · ${detachments.length} detachments`);

    renderFactionPills();
    renderDetFactionPills();
    renderUnits();
    renderDets();
    renderFavs();

  } catch (err) {
    console.warn('Wahapedia sync failed:', err.message);
    units       = UNITS;
    factions    = FACTIONS;
    detachments = DETACHMENTS;
    await dbPutAll('units', UNITS);
    const now = new Date().toLocaleString('en-GB', {dateStyle:'short', timeStyle:'short'});
    await dbPut('meta', {key:'lastSync', value:`Built-in · ${now} (sync failed: ${err.message})`});
    updateSyncNotice(`⚠ Sync failed — using built-in data. Tap ⟳ to retry.`);
    renderFactionPills();
    renderUnits();
  }

  updateStatus();
}

function groupBy(arr, key) {
  const map = {};
  (arr || []).forEach(item => {
    const k = item[key];
    if (!map[k]) map[k] = [];
    map[k].push(item);
  });
  return map;
}

// Map Wahapedia faction IDs/names to colours
function factionColor(id, name) {
  const n = (name || '').toLowerCase();
  if (n.includes('space marine'))  return '#3a6fba';
  if (n.includes('blood angel'))   return '#a02020';
  if (n.includes('dark angel'))    return '#1a4a2a';
  if (n.includes('space wolf'))    return '#4a6a8a';
  if (n.includes('deathwatch'))    return '#2a2a4a';
  if (n.includes('grey knight'))   return '#6a8aaa';
  if (n.includes('chaos space'))   return '#8b2020';
  if (n.includes('death guard'))   return '#4a6a2a';
  if (n.includes('thousand son'))  return '#1a4a8a';
  if (n.includes('world eater'))   return '#aa2020';
  if (n.includes("emperor's child"))return '#8a1a8a';
  if (n.includes('chaos daemon'))  return '#6a1a1a';
  if (n.includes('chaos knight'))  return '#3a1a1a';
  if (n.includes('astra milita'))  return '#6a5a2a';
  if (n.includes('mechanicus'))    return '#8a2a1a';
  if (n.includes('sororitas'))     return '#8a1a3a';
  if (n.includes('custodes'))      return '#b8922a';
  if (n.includes('aeldari'))       return '#2a5a6a';
  if (n.includes('drukhari'))      return '#3a1a5a';
  if (n.includes('harlequin'))     return '#5a2a6a';
  if (n.includes('necron'))        return '#1a5a1a';
  if (n.includes('ork'))           return '#2a5a1a';
  if (n.includes("t'au") || n.includes('tau')) return '#1a4a5a';
  if (n.includes('tyranid'))       return '#4a1a5a';
  if (n.includes('genestealer'))   return '#3a1a4a';
  if (n.includes('votann'))        return '#5a4a2a';
  if (n.includes('imperial knight')) return '#5a3a1a';
  return '#444';
}

// ═══════════════════════════════════════════════════════════════
function filterUnits(q){ unitSearch=q.toLowerCase(); renderUnits(); }

function getFilteredUnits(){
  return units.filter(u=>{
    if(!showLegend && u.legend) return false;
    if(activeFaction!=='all'&&u.faction!==activeFaction) return false;
    if(!unitSearch) return true;
    return u.name.toLowerCase().includes(unitSearch)||
      u.keywords.some(k=>k.toLowerCase().includes(unitSearch))||
      (u.abilities||[]).some(a=>a.name.toLowerCase().includes(unitSearch))||
      u.role.toLowerCase().includes(unitSearch);
  });
}

function renderUnits(){
  const list=document.getElementById('units-list');
  const cnt=document.getElementById('unit-count');
  const filtered=getFilteredUnits();
  cnt.textContent=`${filtered.length} unit${filtered.length!==1?'s':''} found`;
  // Update legend count hint
  const hint=document.getElementById('legend-count-hint');
  if(hint){
    const legendCount=units.filter(u=>activeFaction==='all'?u.legend:u.legend&&u.faction===activeFaction).length;
    hint.textContent=legendCount>0&&!showLegend?`(${legendCount} Legends hidden)`:'';
  }
  if(!filtered.length){list.innerHTML=`<div class="empty"><div class="empty-icon">☠</div><div class="empty-title">No Units Found</div><div class="empty-desc">The Warp offers no answers.</div></div>`;return;}
  list.innerHTML=filtered.map(u=>{
    const fc=factions.find(f=>f.id===u.faction);
    const isFav=favourites.has(u.id);
    return `<div class="unit-card" onclick="openUnit('${u.id}')">
      <div class="unit-header">
        <div class="faction-dot" style="background:${fc?.color||'#444'};"></div>
        <div class="unit-main">
          <div class="unit-name">${u.name}${u.legend?'<span class="legend-badge-card">📖 Legends</span>':''}</div>
          <div class="unit-meta">
            <span class="tag role">${u.role}</span>
            ${u.keywords.slice(0,3).map(k=>`<span class="tag">${k}</span>`).join('')}
          </div>
        </div>
        <div class="unit-pts">${u.pts}<small>pts</small></div>
        <button class="fav-btn${isFav?' active':''}" onclick="event.stopPropagation();toggleFav('${u.id}')">${isFav?'★':'☆'}</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// UNIT SHEET — full Wahapedia-style datasheet
// ═══════════════════════════════════════════════════════════════
function openUnit(id){
  const u=units.find(x=>x.id===id);
  if(!u) return;
  const fc=factions.find(f=>f.id===u.faction);
  const isFav=favourites.has(u.id);

  // ── Header ──
  const baseSizeStr=u.baseSize?`<span style="font-size:0.7rem;color:var(--t3);margin-left:6px;">⬡ ${u.baseSize}</span>`:'';
  const legendStr=u.legend?`<span class="legend-badge">📖 Legends</span>`:'';
  document.getElementById('sheet-header').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
      <div style="flex:1;min-width:0;">
        <div class="sheet-name">${u.name}${baseSizeStr}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;">
          <div class="sheet-faction" style="color:${fc?.color||'var(--t3)'};">${fc?.name||''}</div>
          ${legendStr}
        </div>
        <div style="font-size:0.68rem;color:var(--t3);margin-top:2px;">${u.role}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
        <span class="pts-badge">${u.pts} pts</span>
        <button class="fav-btn${isFav?' active':''}" style="margin:0;" onclick="event.stopPropagation();toggleFav('${u.id}');this.className='fav-btn'+(favourites.has('${u.id}')?' active':'')">${isFav?'★':'☆'}</button>
      </div>
    </div>`;

  let html='';

  // ── 1. Stats ──
  if(u.stats?.length){
    html+=`<div class="sh-section"><div class="sh-title">Characteristics</div>`;
    u.stats.forEach(s=>{
      if(u.stats.length>1) html+=`<div class="stat-model-name">${s.m}</div>`;
      html+=`<div class="stats-row" style="margin-bottom:6px;">
        ${['M','T','Sv','W','Ld','OC'].map(k=>{
          if(k==='Sv'){
  const inv = s.inv && s.inv !== '-'
    ? `${s.inv}${s.inv_descr ? ` (${s.inv_descr})` : ''}`
    : null;

  return `<div class="stat-cell">
    <span class="stat-label">SV</span>
    <span class="stat-val">${s.Sv}</span>
    ${inv ? `<div class="stat-sub">${inv}</div>` : ''}
  </div>`;
}
          return `<div class="stat-cell"><span class="stat-label">${k}</span><span class="stat-val">${s[k]}</span></div>`;
        }).join('')}
      </div>`;
    });
    html+=`</div>`;
  }

  // ── 2. Weapons (split ranged / melee) ──
  if(u.weapons?.length){
    const ranged=u.weapons.filter(w=>w.range!=='Melee');
    const melee=u.weapons.filter(w=>w.range==='Melee');

    function weaponTable(weapons,ismelee){
      const hitCol=ismelee?'WS':'BS';
      const cols=ismelee?6:7; // name + (range?) + A + hit + S + AP + D
      let t=`<div class="wh-weapon-section">
        <div class="wh-weapon-section-header">
          <span class="wh-weapon-type-icon">${ismelee?'⚔️':'🎯'}</span>
          <span class="wh-weapon-type-label">${ismelee?'Melee Weapons':'Ranged Weapons'}</span>
        </div>
        <table class="wh-wtable">
          <thead><tr>
            <th>Name</th>
            ${ismelee?'':'<th>Range</th>'}
            <th>A</th><th>${hitCol}</th><th>S</th><th>AP</th><th>D</th>
          </tr></thead>
          <tbody>`;
      weapons.forEach(w=>{
        const hitVal=ismelee?(w.WS||w.BS||'—'):w.BS||'—';
        const hasKw=w.kw&&w.kw!=='—';
        const kwHtml=hasKw?w.kw.split(',').map(k=>`<span class="wh-wkw-tag">${k.trim()}</span>`).join(''):'';
        // stats row
        t+=`<tr>
          <td>${w.name}</td>
          ${ismelee?'':`<td>${w.range}</td>`}
          <td>${w.A}</td><td>${hitVal}</td><td>${w.S}</td><td>${w.AP}</td><td>${w.D}</td>
        </tr>`;
        // keyword row
        if(hasKw){
          t+=`<tr>
            <td colspan="${cols}" style="padding:0 8px 6px;border-bottom:1px solid var(--b1);">
              <div class="wh-wkw">${kwHtml}</div>
            </td>
          </tr>`;
        }
      });
      t+=`</tbody></table></div>`;
      return t;
    }

    html+=`<div class="sh-section">`;
    if(ranged.length) html+=weaponTable(ranged,false);
    if(melee.length)  html+=weaponTable(melee,true);
    html+=`</div>`;
  }

  // ── 3. Wargear Options ──
  if(u.wargearOptions?.length){
    html+=`<div class="sh-section"><div class="sh-title">Wargear Options</div>
      <ul class="wh-wargear-list">
        ${u.wargearOptions.map(o=>`<li>${o}</li>`).join('')}
      </ul></div>`;
  }

  // ── 4. Core Abilities (Deadly Demise, Feel No Pain, Leader, Scouts etc.) ──
  if(u.coreAbilities?.length){
    // Icon map for well-known core abilities
    const coreIcons = {
      'deadly demise':'💀', 'feel no pain':'🛡', 'fights first':'⚡',
      'leader':'👑', 'lone operative':'🎯', 'scouts':'👁',
      'stealth':'🌑', 'infiltrators':'🗡', 'deep strike':'🪂',
      'firing deck':'🔫', 'hover':'🚁', 'fly':'✈',
      'objective secured':'🏴', 'devastating wounds':'💥',
      'lethal hits':'🎯', 'sustained hits':'🔁', 'twin-linked':'🔗',
      'torrent':'🌊', 'blast':'💣', 'indirect fire':'📡',
      'heavy':'⚓', 'rapid fire':'💨', 'pistol':'🔫',
      'precision':'🎯', 'melta':'🔥', 'anti-':'🔰',
    };
    function coreIcon(name){
      const n=name.toLowerCase();
      for(const [k,v] of Object.entries(coreIcons)) if(n.startsWith(k)||n.includes(k)) return v;
      return '◆';
    }
    html+=`<div class="sh-section"><div class="sh-title">Core Abilities</div>
      <div class="core-abilities">
        ${u.coreAbilities.map(a=>{
          // Split name from value e.g. "Feel No Pain 5+" → name="Feel No Pain" val="5+"
          const match=a.name.match(/^(.*?)(\s+[\d+D\-]+["+\-]?\+?)?$/);
          const aName=match?match[1].trim():a.name;
          const aVal=match&&match[2]?match[2].trim():'';
          return `<div class="core-chip" title="${a.desc||''}">
            <span class="core-chip-icon">${coreIcon(a.name)}</span>
            <span>${aName}</span>
            ${aVal?`<span class="core-chip-val">${aVal}</span>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // ── 4b. Leader info (can lead / attached by) ──
  if(u.canLead?.length){
    html+=`<div class="sh-section"><div class="sh-title">👑 Can Be Attached To</div>
      <div class="leader-list">
        ${u.canLead.map(name=>`<div class="leader-item"><span class="leader-icon">⚔</span>${name}</div>`).join('')}
      </div></div>`;
  }
  if(u.attachedBy?.length){
    html+=`<div class="sh-section"><div class="sh-title">🔗 Can Be Led By</div>
      <div class="leader-list">
        ${u.attachedBy.map(name=>`<div class="leader-item"><span class="leader-icon">👑</span>${name}</div>`).join('')}
      </div></div>`;
  }

  // ── 5. Abilities ──
  if(u.abilities?.length){
    html+=`<div class="sh-section"><div class="sh-title">Abilities</div>`;
    // faction ability first if flagged
    u.abilities.forEach(a=>{
      const isFactionAbility=a.faction;
      html+=`<div class="ability-item">
        ${isFactionAbility?`<div style="font-size:0.58rem;font-weight:700;letter-spacing:0.08em;color:${fc?.color||'var(--red2)'};text-transform:uppercase;margin-bottom:2px;">FACTION: ${fc?.name||''}</div>`:''}
        <div class="ability-name" style="${isFactionAbility?`color:${fc?.color||'var(--red2)'}`:''}">${a.name}</div>
        <div class="ability-desc">${a.desc}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  // ── 5. Wargear Abilities ──
  if(u.wargearAbilities?.length){
    html+=`<div class="sh-section"><div class="sh-title">Wargear Abilities</div>`;
    u.wargearAbilities.forEach(a=>{
      html+=`<div class="ability-item"><div class="ability-name">${a.name}</div><div class="ability-desc">${a.desc}</div></div>`;
    });
    html+=`</div>`;
  }

  // ── 6. Unit Composition ──
  if(u.composition?.length){
    html+=`<div class="sh-section"><div class="sh-title">Unit Composition</div>
      <div class="wh-comp-wrap">`;
    u.composition.forEach(c=>{
      html+=`<div class="wh-comp-row">
        <span class="wh-comp-models">${c.models}</span>
        ${c.pts!==undefined?`<span class="wh-comp-pts">${c.pts}</span>`:''}
      </div>`;
    });
    if(u.loadout){
      html+=`<div class="wh-comp-note">${u.loadout}</div>`;
    }
    html+=`</div></div>`;
  } else {
    // Fallback: show pts from unit card
    html+=`<div class="sh-section"><div class="sh-title">Points</div>
      <div class="wh-comp-wrap">
        <div class="wh-comp-row">
          <span class="wh-comp-models">Base cost</span>
          <span class="wh-comp-pts">${u.pts} pts</span>
        </div>
      </div></div>`;
  }

  // ── 6b. Transport capacity ──
  if(u.transport){
    html+=`<div class="sh-section"><div class="sh-title">🚌 Transport</div>
      <div class="transport-box">
        <div class="transport-capacity">${u.transport}</div>
      </div></div>`;
  }

  // ── 6c. Damaged profile ──
  if(u.damagedW && u.damagedDesc){
    html+=`<div class="sh-section"><div class="sh-title">⚠ Damaged</div>
      <div class="damaged-box">
        <div class="damaged-row">
          <span class="damaged-wounds">${u.damagedW} WOUNDS</span>
          <span class="damaged-desc">${u.damagedDesc}</span>
        </div>
      </div></div>`;
  }

  // ── 7. Keywords ──
  const factionKws = u.factionKeywords||[fc?.name].filter(Boolean);
  if(u.keywords?.length||factionKws.length){
    html+=`<div class="sh-section">`;
    if(u.keywords?.length){
      html+=`<div class="sh-title">Keywords</div>
        <div class="wh-kw-wrap" style="margin-bottom:8px;">
          ${u.keywords.map(k=>`<span class="wh-kw-pill">${k}</span>`).join('')}
        </div>`;
    }
    if(factionKws.length){
      html+=`<div class="sh-title" style="margin-top:${u.keywords?.length?'8px':'0'};">Faction Keywords</div>
        <div class="wh-kw-wrap">
          ${factionKws.map(k=>`<span class="wh-kw-pill faction">${k}</span>`).join('')}
        </div>`;
    }
    html+=`</div>`;
  }

  // ── 8. Core Stratagems (filtered to relevant for this unit) ──
  if(coreStratagems.length){
    const unitKws = new Set((u.keywords||[]).map(k=>k.toUpperCase()));

    function isRelevant(s) {
      // Excluded: unit has a keyword that disqualifies it
      if (s.excludeKws && s.excludeKws.some(kw => unitKws.has(kw))) return false;
      // Universal: no target restrictions
      if (!s.targetKws || s.targetKws.length === 0) return true;
      // Unit must have at least one required keyword
      return s.targetKws.some(kw => unitKws.has(kw));
    }

    const relevant   = coreStratagems.filter(s=>isRelevant(s));
    const irrelevant = coreStratagems.filter(s=>!isRelevant(s));
    // Show relevant first, then a collapsed "show all" toggle
    const showAll = relevant.length === 0; // if none relevant, show all by default

    html+=`<div class="sh-section">
      <div class="sh-title">Core Stratagems
        <span style="font-size:0.62rem;color:var(--t3);font-weight:400;margin-left:6px;">(${relevant.length} applicable)</span>
      </div>
      <div class="core-strat-list">`;

    const toShow = showAll ? coreStratagems : relevant;
    toShow.forEach(s=>{
      const phase = s.phase ? s.phase.replace('phase','').replace('Phase','').trim() : '';
      const typeShort = (s.type||'').replace('Core – ','').replace(' Stratagem','');
      html+=`<div class="core-strat-card relevant" id="cs-${u.id}-${s.id}" onclick="toggleCoreStrat('${u.id}','${s.id}')">
        <div class="core-strat-header">
          <span class="core-strat-name">${s.name}</span>
          <div class="core-strat-badges">
            ${phase?`<span class="core-strat-phase">${phase}</span>`:''}
            <span class="core-strat-cp">${s.cost}</span>
          </div>
        </div>
        <div class="core-strat-body">
          <div class="core-strat-type">${typeShort}</div>
          <div class="core-strat-desc">${s.desc}</div>
        </div>
      </div>`;
    });

    if(!showAll && irrelevant.length>0){
      html+=`<div style="margin-top:4px;">
        <button onclick="toggleAllCoreStrats('${u.id}')" id="cs-toggle-${u.id}"
          style="background:none;border:1px solid var(--b2);border-radius:8px;
          padding:6px 12px;color:var(--t3);font-size:0.72rem;cursor:pointer;width:100%;">
          Show all ${coreStratagems.length} core stratagems ▼
        </button>
        <div id="cs-all-${u.id}" style="display:none;margin-top:6px;">
          <div class="core-strat-list">
          ${irrelevant.map(s=>{
            const phase = s.phase ? s.phase.replace('phase','').replace('Phase','').trim() : '';
            const typeShort = (s.type||'').replace('Core – ','').replace(' Stratagem','');
            return `<div class="core-strat-card" id="cs-${u.id}-${s.id}x" onclick="toggleCoreStrat('${u.id}','${s.id}x')">
              <div class="core-strat-header">
                <span class="core-strat-name">${s.name}</span>
                <div class="core-strat-badges">
                  ${phase?`<span class="core-strat-phase">${phase}</span>`:''}
                  <span class="core-strat-cp">${s.cost}</span>
                </div>
              </div>
              <div class="core-strat-body">
                <div class="core-strat-type">${typeShort}</div>
                <div class="core-strat-desc">${s.desc}</div>
              </div>
            </div>`;
          }).join('')}
          </div>
        </div>
      </div>`;
    }

    html+=`</div></div>`;
  }

  // ── 9. Detachments (all for this faction) ──
  const factionDets=detachments.filter(d=>d.faction===u.faction);
  if(factionDets.length){
    html+=`<div class="sh-section"><div class="sh-title">Detachments & Stratagems</div>`;
    factionDets.forEach((d,i)=>{
      const gid=`whdg-${u.id}-${i}`;
      html+=`<div class="wh-det-group" id="${gid}">
        <div class="wh-det-group-hdr" onclick="toggleWhDet('${gid}')">
          <div class="wh-det-group-bar" style="background:${fc?.color||'#444'};"></div>
          <div class="wh-det-group-info">
            <div class="wh-det-group-name">${d.name}</div>
            <div class="wh-det-group-rule">${d.rule}</div>
          </div>
          <div class="wh-det-group-chevron">▼</div>
        </div>
        <div class="wh-det-body">
          <div class="wh-det-rule-box"><strong style="color:var(--t1);">${d.rule}:</strong> ${d.ruleDesc}</div>
          ${d.stratagems?.length?`<div class="wh-det-sub">Stratagems</div>${d.stratagems.map(s=>`
            <div class="wh-strat">
              <div class="wh-strat-top">
                <span class="wh-strat-name">${s.name}</span>
                <span class="wh-strat-cost">${s.cost}</span>
              </div>
              <div class="wh-strat-sub">${d.name}</div>
              <div class="wh-strat-desc">${s.desc}</div>
            </div>`).join('')}`:''}
          ${d.enhancements?.length?`<div class="wh-det-sub">Enhancements</div>${d.enhancements.map(e=>`
            <div class="wh-enh">
              <div class="wh-enh-top">
                <span class="wh-enh-name">${e.name}</span>
                <span class="wh-enh-pts">${e.pts}</span>
              </div>
              <div class="wh-enh-desc">${e.desc}</div>
            </div>`).join('')}`:''}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  document.getElementById('sheet-body').innerHTML=html;
  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('unit-sheet').classList.add('open');
}

function toggleCoreStrat(uid, sid){
  const card = document.getElementById(`cs-${uid}-${sid}`);
  if(card) card.classList.toggle('open');
}

function toggleAllCoreStrats(uid){
  const container = document.getElementById(`cs-all-${uid}`);
  const btn = document.getElementById(`cs-toggle-${uid}`);
  if(!container) return;
  const showing = container.style.display !== 'none';
  container.style.display = showing ? 'none' : 'block';
  if(btn) btn.textContent = showing
    ? `Show all core stratagems ▼`
    : `Hide extra stratagems ▲`;
}

function toggleWhDet(id){
  const el=document.getElementById(id);
  if(!el) return;
  el.classList.toggle('open');
}

function closeSheet(){
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('unit-sheet').classList.remove('open');
}

// ──────────────────────────────────────────────────────────────
// IMPROVED BOTTOM SHEET GESTURES (no more accidental closes)
// ──────────────────────────────────────────────────────────────
const sheet = document.getElementById('unit-sheet');
const sheetBody = document.getElementById('sheet-body');
const sheetDrag = sheet.querySelector('.sheet-drag');

let touchStartY = 0;
let touchStartTime = 0;
let isAtTop = false;

function setupSheetGestures() {
  // 1. Drag the handle bar → always closes
  sheetDrag.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }, { passive: true });

  sheetDrag.addEventListener('touchend', e => {
    const dy = e.changedTouches[0].clientY - touchStartY;
    const duration = Date.now() - touchStartTime;
    if (dy > 80 || (dy > 30 && duration < 300)) closeSheet();
  }, { passive: true });

  // 2. Pull-to-close when content is scrolled to the very top
  sheetBody.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
    isAtTop = sheetBody.scrollTop <= 5;
  }, { passive: true });

  sheetBody.addEventListener('touchmove', e => {
    if (!isAtTop) return;
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 30) {
      e.preventDefault();                    // stop normal scroll
      sheet.style.transition = 'none';
      sheet.style.transform = `translateY(${dy}px)`;
    }
  }, { passive: false });

  sheetBody.addEventListener('touchend', e => {
    if (!isAtTop) return;
    sheet.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)';
    sheet.style.transform = '';

    const dy = e.changedTouches[0].clientY - touchStartY;
    const duration = Date.now() - touchStartTime;
    if (dy > 120 || (dy > 50 && duration < 250)) {
      closeSheet();
    }
  }, { passive: true });
}

// ═══════════════════════════════════════════════════════════════
// DETACHMENTS
// ═══════════════════════════════════════════════════════════════
function filterDets(q){ detSearch=q.toLowerCase(); renderDets(); }

function renderDets(){
  const el=document.getElementById('det-list');
  const filtered=detachments.filter(d=>{
    if(detFaction!=='all'&&d.faction!==detFaction) return false;
    if(!detSearch) return true;
    return d.name.toLowerCase().includes(detSearch)||
      d.rule.toLowerCase().includes(detSearch)||
      d.ruleDesc.toLowerCase().includes(detSearch)||
      (d.stratagems||[]).some(s=>s.name.toLowerCase().includes(detSearch));
  });
  if(!filtered.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No Detachments Found</div><div class="empty-desc">Try a different search.</div></div>`;return;}
  const byFaction={};
  filtered.forEach(d=>{(byFaction[d.faction]=byFaction[d.faction]||[]).push(d);});
  let html='';
  Object.entries(byFaction).forEach(([fid,dets])=>{
    const fc=factions.find(f=>f.id===fid);
    html+=`<div class="det-faction-header">
      <div class="det-faction-line" style="background:${fc?.color||'#444'}40;"></div>
      <div class="det-faction-label" style="color:${fc?.color||'#888'}">${fc?.name||fid}</div>
      <div class="det-faction-line" style="background:${fc?.color||'#444'}40;"></div>
    </div>`;
    dets.forEach(d=>{
      const did=`${d.faction}-${d.name.replace(/\s/g,'_')}`;
      const open=expandedDets.has(did);
      html+=`<div class="det-card${open?' open':''}" id="dc-${did}">
        <div class="det-header" onclick="toggleDet('${did}')">
          <div class="det-color-bar" style="background:${fc?.color||'#444'};"></div>
          <div class="det-info">
            <div class="det-name">${d.name}</div>
            <div class="det-rule-name">${d.rule}</div>
          </div>
          <span class="det-chevron">▼</span>
        </div>
        <div class="det-body">
          <div class="det-rule-desc">${d.ruleDesc}</div>
          ${d.stratagems?.length?`<div class="sub-title">Stratagems</div>${d.stratagems.map(s=>`<div class="strat-item"><div class="strat-top"><span class="strat-name">${s.name}</span><span class="strat-cost">${s.cost}</span></div><div class="strat-desc">${s.desc}</div></div>`).join('')}`:''}
          ${d.enhancements?.length?`<div class="sub-title">Enhancements</div>${d.enhancements.map(e=>`<div class="enh-item"><div class="enh-top"><span class="enh-name">${e.name}</span><span class="enh-pts">${e.pts}</span></div><div class="enh-desc">${e.desc}</div></div>`).join('')}`:''}
        </div>
      </div>`;
    });
  });
  el.innerHTML=html;
}

function toggleDet(id){
  if(expandedDets.has(id)) expandedDets.delete(id);
  else expandedDets.add(id);
  renderDets();
  setTimeout(()=>document.getElementById('dc-'+id)?.scrollIntoView({behavior:'smooth',block:'nearest'}),80);
}

// ═══════════════════════════════════════════════════════════════
// FAVOURITES
// ═══════════════════════════════════════════════════════════════
async function toggleFav(id){
  if(favourites.has(id)) favourites.delete(id);
  else favourites.add(id);
  await dbPut('meta',{key:'favourites',value:[...favourites]});
  renderUnits();
  renderFavs();
}

function renderFavs(){
  const el=document.getElementById('favs-list');
  const favUnits=units.filter(u=>favourites.has(u.id));
  if(!favUnits.length){el.innerHTML=`<div class="empty"><div class="empty-icon">★</div><div class="empty-title">No Favourites Yet</div><div class="empty-desc">Tap ☆ on any unit to save it here for quick access.</div></div>`;return;}
  el.innerHTML=favUnits.map(u=>{
    const fc=factions.find(f=>f.id===u.faction);
    return `<div class="unit-card" onclick="openUnit('${u.id}')">
      <div class="unit-header">
        <div class="faction-dot" style="background:${fc?.color||'#444'};"></div>
        <div class="unit-main">
          <div class="unit-name">${u.name}</div>
          <div class="unit-meta"><span class="tag role">${u.role}</span><span class="tag" style="color:${fc?.color}">${fc?.name||''}</span></div>
        </div>
        <div class="unit-pts">${u.pts}<small>pts</small></div>
        <button class="fav-btn active" onclick="event.stopPropagation();toggleFav('${u.id}')">★</button>
      </div>
    </div>`;
  }).join('');
}
